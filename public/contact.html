  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — TimeNow</title>
  <meta name="description" content="Contact TimeNow. Send feedback, questions, or support requests." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5764J5L6"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <header class="app-header" role="banner">
    <div class="header-container">
      <div class="header-left">
        <a href="/" class="logo" aria-label="TimeNow home"><img src="/favicon.svg" alt="" class="logo-icon" />TimeNow</a>
      </div>
      <div class="header-right">
        <a href="/continents">Continents</a>
        <a href="/countries">Countries</a>
        <a href="/world-clock">World Clock</a>
        <a href="/tools">Tools</a>
        <div class="header-search-wrap">
          <label for="global-search" class="visually-hidden">Search cities</label>
          <input type="text" id="global-search" class="header-search-input" placeholder="Search" autocomplete="off" aria-label="Search cities" />
          <div id="global-search-results" class="global-search-results" aria-live="polite"></div>
        </div>
        <button type="button" class="theme-btn" id="theme-btn" title="Toggle theme" aria-label="Toggle dark/light theme">🌙</button>
        <button type="button" class="sound-btn theme-btn" id="sound-btn" title="Clock tick sound" aria-label="Toggle clock tick sound">🔇</button>
      </div>
    </div>
  </header>
  <main class="main">
    <section class="section contact-page">
      <h1 class="section-title">✉️ Contact us</h1>
      <p>Have a question, feedback, or need help? Fill out the form below and we’ll get back to you.</p>

      <form id="contact-form" class="contact-form" action="#" method="post" novalidate>
        <div class="form-row">
          <label for="contact-name">Your name <span class="required">*</span></label>
          <input type="text" id="contact-name" name="name" required maxlength="120" placeholder="e.g. Jane Smith" autocomplete="name" />
        </div>
        <div class="form-row">
          <label for="contact-email">Your email <span class="required">*</span></label>
          <input type="email" id="contact-email" name="email" required maxlength="320" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-row">
          <label for="contact-subject">Subject <span class="required">*</span></label>
          <input type="text" id="contact-subject" name="subject" required maxlength="200" placeholder="e.g. Feature request or bug report" />
        </div>
        <div class="form-row">
          <label for="contact-message">Message <span class="required">*</span></label>
          <textarea id="contact-message" name="message" required rows="5" maxlength="5000" placeholder="Your message..."></textarea>
        </div>
        <div class="form-row form-actions">
          <button type="submit" id="contact-submit" class="btn btn-primary">Send</button>
          <span id="contact-status" class="contact-status" aria-live="polite"></span>
        </div>
      </form>

      <p><a href="/">Back to home</a></p>
    </section>
  </main>
  <footer class="global-footer" role="contentinfo">
    <p class="footer-brand">🕐 TimeNow — Exact time, any time zone</p>
    <nav class="footer-nav" aria-label="Footer">
      <a href="/about">📄 About</a>
      <a href="/privacy">🔒 Privacy</a>
      <a href="/terms">📋 Terms</a>
      <a href="/contact">✉️ Contact</a>
      <a href="/sitemap.xml">🗺️ Sitemap</a>
    </nav>
  </footer>
  <script>
(function() {
  var form = document.getElementById('contact-form');
  var submitBtn = document.getElementById('contact-submit');
  var statusEl = document.getElementById('contact-status');
  if (!form || !submitBtn || !statusEl) return;

  function setStatus(msg, isError) {
    statusEl.textContent = msg;
    statusEl.className = 'contact-status ' + (isError ? 'contact-status--error' : 'contact-status--success');
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var name = (document.getElementById('contact-name') && document.getElementById('contact-name').value) || '';
    var email = (document.getElementById('contact-email') && document.getElementById('contact-email').value) || '';
    var subject = (document.getElementById('contact-subject') && document.getElementById('contact-subject').value) || '';
    var message = (document.getElementById('contact-message') && document.getElementById('contact-message').value) || '';
    if (!name.trim() || !email.trim() || !subject.trim() || !message.trim()) {
      setStatus('Please fill in all required fields.', true);
      return;
    }
    submitBtn.disabled = true;
    setStatus('Sending...', false);
    fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim(), email: email.trim(), subject: subject.trim(), message: message.trim() })
    })
      .then(function(r) { return r.json().then(function(data) { return { ok: r.ok, data: data }; }); })
      .then(function(result) {
        if (result.ok) {
          setStatus('Message sent. We\'ll get back to you soon.', false);
          form.reset();
        } else {
          setStatus(result.data && result.data.error ? result.data.error : 'Something went wrong. Please try again or email us directly.', true);
        }
      })
      .catch(function() {
        setStatus('Could not send. Please email us at saregamaus@gmail.com.', true);
      })
      .finally(function() { submitBtn.disabled = false; });
  });
})();
  </script>
  <script type="module" src="/js/app.js"></script>
  <script src="/js/search.js" defer></script>
</body>
</html>
